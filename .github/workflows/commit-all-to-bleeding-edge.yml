name: Forward Commits to Bleeding-Edge

on:
  push:
    branches:
      - '*'
      - '!bleeding-edge'
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
    # Manual recovery when push-triggered runs stall in the runner queue.

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-edge]')

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Fetches all history for all branches and tags

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Cherry-Pick to Bleeding-Edge
      run: |
        git checkout bleeding-edge
        before_sha="$(git rev-parse HEAD)"
        if ! git cherry-pick "${{ github.sha }}"; then
          if git status | grep -q 'Unmerged paths'; then
            git add .
            git cherry-pick --continue
          else
            exit 1
          fi
        fi
        # GITHUB_TOKEN cannot update workflow files on push; keep bleeding-edge copies.
        git checkout "${before_sha}" -- .github/workflows
        if ! git diff --quiet -- .github/workflows; then
          git add .github/workflows
          git commit -m "chore(ci): retain bleeding-edge workflow files [skip-edge]"
        fi
        git push origin bleeding-edge
