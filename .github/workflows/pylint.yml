name: Pylint

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "pylint>=2.0.0,<3.3.9"
    - name: Analysing the code with pylint
      run: |
        mapfile -t py_files < <(git ls-files '*.py' \
          | grep -Ev '^(vendor/|\.venv/)' \
          | grep -Ev '/toolset/uic/')
        # duplicate-code (R0801) is not actionable at monorepo scale; exit-zero matches flake8 CI posture.
        pylint --disable=duplicate-code --max-line-length=100 --exit-zero "${py_files[@]}"
