# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true
    - name: Ensure Git LFS files are materialized
      run: git lfs pull
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-timeout
        pip install -e "./Libraries/PyKotor[gl]"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install "numpy>=1.26.0,<2.0.0"
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=docs/archive,helper_scripts
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=docs/archive,helper_scripts
    - name: Test with pytest
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        pytest --import-mode=importlib -m "not gui and not slow" --timeout=120 \
          --ignore=Libraries/PyKotor/tests/resource/formats/test_mdl_ascii.py \
          --ignore=Libraries/PyKotor/tests/test_utility/test_registry_strict_typing.py \
          --ignore=Libraries/PyKotor/tests/resource/formats/test_archive_serializer_regressions.py \
          --ignore=Libraries/PyKotor/tests/test_markdown_validation.py \
          --ignore=Libraries/PyKotor/tests/test_utility \
          --ignore=Libraries/PyKotor/tests/tslpatcher \
          Libraries/PyKotor/tests
