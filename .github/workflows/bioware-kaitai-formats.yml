name: bioware-kaitai-formats

on:
  push:
    paths:
      - "Libraries/bioware-kaitai-formats/**"
      - ".github/workflows/bioware-kaitai-formats.yml"
  pull_request:
    paths:
      - "Libraries/bioware-kaitai-formats/**"
      - ".github/workflows/bioware-kaitai-formats.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync workspace (bioware-kaitai-formats)
        run: uv sync --package bioware-kaitai-formats --extra dev
      - name: Pytest
        run: uv run pytest Libraries/bioware-kaitai-formats/tests -v --timeout=120
